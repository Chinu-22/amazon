<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>animation</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        .container {
            width: 100vw;
            height: 100vh;
            background-color: aqua;
            border: 5px solid black;
        }

        .box {
            width: 300px;
            height: 80px;
            background-color: blue;
            border: 3px solid brown;
            border-radius: 10px;
            margin: 10px;
            position: relative;
            animation-name: rightmovement;
            animation-timing-function: linear;
            animation-direction: alternate;
            animation-duration: 5s;
            animation-iteration-count: infinite;

        }

        @keyframes rightmovement {
            from {
                top: 0;
                left: 0;
            }

            to {
                top: 0;
                left: 1200px;
            }
        }

        #box2{
            width: 350px;
            height: 80px;
            background-color: pink;
            border: 3px solid brown;
            border-radius: 10px;
            margin: 10px;
            position: relative;
            animation-name: leftmovement;
            animation-timing-function: ease-in;
            animation-direction: alternate;
            animation-duration: 5s;
            animation-iteration-count: infinite;

        }



        @keyframes leftmovement {
            from {
                top: 600;
                left: 1350;
            }

            to {
                top: 600;
                left: 0;
            }
        }

        #circle{
            width: 50px;
            height: 60px;
            background-color: blue;
            border: 3px solid yellow;
            border-radius: 50px;
            margin: 10px;
            position: relative;
            top: 230px;
            left: 206px;


        }
    </style>
</head>

<body>

    <div class="container">
        <div class="box">

        </div>
        <div id="cirlce">


        </div>
        <div id="box2">

        </div>
        </div>



</body>

</html>
